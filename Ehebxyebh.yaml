# 1. 基础设置与你的高级 DNS 配置
mixed-port: 7897
allow-lan: true
mode: rule
log-level: info
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
dns:
  enable: true
  listen: "127.0.0.1:5335"
  use-system-hosts: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 180.76.76.76
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - "https://dns.alidns.com/dns-query"
  nameserver:
    - 223.5.5.5
    - 223.6.6.6
    - 119.29.29.29
    - 180.76.76.76
    - "https://dns.alidns.com/dns-query"
    - "https://223.6.6.6/dns-query#h3=true"
    - "https://doh.pub/dns-query"
  fallback:
    - "https://dns.google/dns-query"
    - "https://cloudflare-dns.com/dns-query"
    - "tls://8.8.8.8:853"
    - "tls://1.1.1.1:853"
    - 8.8.8.8
    - 1.1.1.1
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
      - 127.0.0.1/32
    domain:
      - "+.google.com"
      - "+.facebook.com"
      - "+.twitter.com"
      - "+.youtube.com"
      - "+.xn--ngstr-lra8j.com"
      - "+.google.cn"
      - "+.googleapis.cn"
      - "+.googleapis.com"
      - "+.gvt1.com"
      - "+.github.com"
      - "+.telegram.org"
      - "+.openai.com"
  nameserver-policy:
    "geosite:cn,private,geolocation-cn":
      - "https://dns.alidns.com/dns-query"
      - "https://223.6.6.6/dns-query#h3=true"
      - "https://doh.pub/dns-query"
      - 223.5.5.5
      - 119.29.29.29
    "geosite:geolocation-!cn,google,youtube,telegram,openai,anthropic,github":
      - "https://dns.google/dns-query"
      - "https://cloudflare-dns.com/dns-query"
      - "tls://8.8.8.8:853"
  fake-ip-filter: ["*.lan", "stun.*.*.*", "stun.*.*", time.windows.com, time.nist.gov, time.apple.com, time.asia.apple.com, "*.ntp.org.cn", "*.openwrt.pool.ntp.org", time1.cloud.tencent.com, time.ustc.edu.cn, pool.ntp.org, ntp.ubuntu.com, ntp.aliyun.com, ntp1.aliyun.com, ntp2.aliyun.com, ntp3.aliyun.com, ntp4.aliyun.com, ntp5.aliyun.com, ntp6.aliyun.com, ntp7.aliyun.com, time1.aliyun.com, time2.aliyun.com, time3.aliyun.com, time4.aliyun.com, time5.aliyun.com, time6.aliyun.com, time7.aliyun.com, "*.time.edu.cn", time1.apple.com, time2.apple.com, time3.apple.com, time4.apple.com, time5.apple.com, time6.apple.com, time7.apple.com, time1.google.com, time2.google.com, time3.google.com, time4.google.com, music.163.com, "*.music.163.com", "*.126.net", musicapi.taihe.com, music.taihe.com, songsearch.kugou.com, trackercdn.kugou.com, "*.kuwo.cn", api-jooxtt.sanook.com, api.joox.com, joox.com, y.qq.com, "*.y.qq.com", streamoc.music.tc.qq.com, mobileoc.music.tc.qq.com, isure.stream.qqmusic.qq.com, dl.stream.qqmusic.qq.com, aqqmusic.tc.qq.com, amobile.music.tc.qq.com, "*.xiami.com", "*.music.migu.cn", music.migu.cn, "*.msftconnecttest.com", "*.msftncsi.com", localhost.ptlogin2.qq.com, "*.*.*.srv.nintendo.net", "*.*.stun.playstation.net", "xbox.*.*.microsoft.com", "*.ipv6.microsoft.com", "*.*.xboxlive.com", speedtest.cros.wr.pvp.net]
profile:
  store-selected: true
  store-fake-ip: false
sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    HTTP: {ports: [80, 8080-8880], override-destination: true}
    QUIC: {ports: [443, 8443]}
    TLS: {ports: [443, 8443]}
geodata-mode: true
geo-auto-update: true
geodata-loader: standard
geo-update-interval: 24
geox-url:
  geoip: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat
  geosite: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat
  mmdb: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb
  asn: https://testingcf.jsdelivr.net/gh/xishang0128/geoip@latest/GeoLite2-ASN.mmdb

# 2. 策略组
proxy-groups:
  - name: "家宽"
    type: select
    proxies: [DIRECT, REJECT]
    use: [sub1]
    filter: "(?i)家宽|home|residential|hkt"
  - name: "香港"
    type: url-test
    use: [sub1]
    filter: "(?i)港|hk|hongkong|hong.kong"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 100
    lazy: false
  - name: "美国"
    type: url-test
    use: [sub1]
    filter: "(?i)美|us|unitedstates|united.states"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 100
    lazy: false
  - name: "日本"
    type: url-test
    use: [sub1]
    filter: "(?i)日|jp|japan"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 100
    lazy: false
  - name: "新加坡"
    type: url-test
    use: [sub1]
    filter: "(?i)新加坡|狮城|sg|singapore"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 100
    lazy: false
  - name: "台湾"
    type: url-test
    use: [sub1]
    filter: "(?i)台|tw|taiwan"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 100
    lazy: false
  - name: "低倍"
    type: select
    proxies: [DIRECT, REJECT]
    use: [sub1]
    filter: "(?i)0\\.|免费|下载|0\\.0"
  - name: "高倍"
    type: select
    proxies: [DIRECT, REJECT]
    use: [sub1]
    filter: "(?i)x[1235](\\.| |$|倍)"
  - name: "节点选择"
    type: select
    proxies: ["自动选择", DIRECT, REJECT, "家宽", "香港", "美国", "日本", "新加坡", "台湾", "低倍", "高倍"]
    use: [sub1]
  - name: "自动选择"
    type: url-test
    use: [sub1]
    filter: "(?i)^(?!.*?(下载专用|免费|free|ver\\.|x0\\.[0-9]|x[2-9]\\.|x1\\.[5-9]|高倍|剩余|套餐|重置|到期|expire|traffic|流量|GB|TG|频道|官网|测试|test|trial|体验))"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 150
    lazy: false
  - name: "广告拦截"
    type: select
    proxies: [REJECT, DIRECT, "节点选择"]
  - name: "AI 服务"
    type: select
    proxies: ["节点选择", "自动选择", DIRECT, REJECT, "家宽", "香港", "美国", "日本", "新加坡", "台湾", "低倍", "高倍"]
  - name: "油管视频"
    type: select
    proxies: ["节点选择", "自动选择", DIRECT, REJECT, "家宽", "香港", "美国", "日本", "新加坡", "台湾", "低倍", "高倍"]
  - name: "谷歌服务"
    type: select
    proxies: ["节点选择", "自动选择", DIRECT, REJECT, "家宽", "香港", "美国", "日本", "新加坡", "台湾", "低倍", "高倍"]
  - name: "微软服务"
    type: select
    proxies: ["节点选择", "自动选择", DIRECT, REJECT, "家宽", "香港", "美国", "日本", "新加坡", "台湾", "低倍", "高倍"]
  - name: "苹果服务"
    type: select
    proxies: ["节点选择", "自动选择", DIRECT, REJECT, "家宽", "香港", "美国", "日本", "新加坡", "台湾", "低倍", "高倍"]
  - name: "电报消息"
    type: select
    proxies: ["新加坡", "香港", "节点选择", "自动选择", DIRECT, REJECT, "家宽", "美国", "日本", "台湾", "低倍", "高倍"]
  - name: "奈飞"
    type: select
    proxies: ["节点选择", "自动选择", DIRECT, REJECT, "家宽", "香港", "美国", "日本", "新加坡", "台湾", "低倍", "高倍"]
  - name: "代码托管"
